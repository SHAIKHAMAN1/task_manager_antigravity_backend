name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t shaikhaman1/task_manager:backend .

      - name: Push Docker Image
        run: docker push shaikhaman1/task_manager:backend

      - name: Deploy EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull shaikhaman1/task_manager:backend

            sudo docker rm -f backend || true

            sudo docker run -d \
            --restart always \
            --network taskflow-net \
            -p 5000:5000 \
            --name backend \
            -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            shaikhaman1/task_manager:backend
