name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Backend Docker Image
        run: docker build -t shaikhaman1/task_manager:backend .

      # Push Docker Image
      - name: Push Backend Docker Image
        run: docker push shaikhaman1/task_manager:backend

      # Deploy to EC2
      - name: Deploy Backend on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull shaikhaman1/task_manager:backend

            sudo docker stop backend || true
            sudo docker rm backend || true

            sudo docker network create taskflow-net || true

            sudo docker run -d \
              --restart always \
              --network taskflow-net \
              -p 5000:5000 \
              --name backend \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRE="7d" \
              -e NODE_ENV="production" \
              -e CLIENT_URL="http://35.88.66.82:5173" \
              shaikhaman1/task_manager:backend
